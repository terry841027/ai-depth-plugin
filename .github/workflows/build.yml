name: Build AI Depth DLL

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Clone FFGL SDK
        run: git clone --depth 1 https://github.com/resolume/ffgl.git ${{ github.workspace }}\..\ffgl

      - name: Install GLEW
        run: vcpkg install glew:x64-windows

      - name: Download ONNX Runtime with DirectML (NuGet)
        run: |
          # NuGet package includes ORT + DirectML EP + dml_provider_factory.h
          $url = "https://api.nuget.org/v3-flatcontainer/microsoft.ml.onnxruntime.directml/1.20.1/microsoft.ml.onnxruntime.directml.1.20.1.nupkg"
          Invoke-WebRequest -Uri $url -OutFile "ort-dml.zip"
          Expand-Archive -Path "ort-dml.zip" -DestinationPath "ort-dml-pkg" -Force

          # Normalise into the layout CMakeLists.txt expects
          New-Item -ItemType Directory -Force "onnxruntime/include"
          New-Item -ItemType Directory -Force "onnxruntime/lib"
          Copy-Item "ort-dml-pkg/build/native/include/*"            "onnxruntime/include/" -Recurse -Force
          Copy-Item "ort-dml-pkg/build/native/lib/x64/onnxruntime.lib" "onnxruntime/lib/"
          Copy-Item "ort-dml-pkg/runtimes/win-x64/native/onnxruntime.dll" "onnxruntime/lib/"
          Copy-Item "ort-dml-pkg/runtimes/win-x64/native/DirectML.dll"    "onnxruntime/lib/"

      - name: Download Depth Anything V2 Small ONNX model
        run: |
          $url = "https://huggingface.co/onnx-community/depth-anything-v2-small/resolve/main/onnx/model.onnx"
          Invoke-WebRequest -Uri $url -OutFile "depth_anything_v2_vits.onnx"

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DORT_DIR="${{ github.workspace }}/onnxruntime"

      - name: Build Release
        run: cmake --build build --config Release

      - name: Stage model + GLEW
        run: |
          Copy-Item "depth_anything_v2_vits.onnx"                   "build/Release/"
          Copy-Item "C:/vcpkg/installed/x64-windows/bin/glew32.dll" "build/Release/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIDepthMap
          path: build/Release/
