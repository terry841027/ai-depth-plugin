name: Build AI Depth DLL

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Clone FFGL SDK
        run: git clone --depth 1 https://github.com/resolume/ffgl.git ${{ github.workspace }}\..\ffgl

      - name: Install GLEW
        run: vcpkg install glew:x64-windows

      - name: Download ONNX Runtime (CPU, v1.20.1)
        run: |
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v1.20.1/onnxruntime-win-x64-1.20.1.zip"
          Invoke-WebRequest -Uri $url -OutFile "ort.zip"
          Expand-Archive -Path "ort.zip" -DestinationPath "."
          Rename-Item "onnxruntime-win-x64-1.20.1" "onnxruntime"

      - name: Download Depth Anything V2 Small ONNX model
        run: |
          $url = "https://huggingface.co/onnx-community/depth-anything-v2-small/resolve/main/onnx/model.onnx"
          Invoke-WebRequest -Uri $url -OutFile "depth_anything_v2_vits.onnx"

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DORT_DIR="${{ github.workspace }}/onnxruntime"

      - name: Build Release
        run: cmake --build build --config Release

      - name: Stage model + GLEW
        run: |
          Copy-Item "depth_anything_v2_vits.onnx"                  "build/Release/"
          Copy-Item "C:/vcpkg/installed/x64-windows/bin/glew32.dll" "build/Release/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIDepthMap
          path: build/Release/
