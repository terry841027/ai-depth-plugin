name: Build AI Depth DLL

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Clone FFGL SDK
        run: git clone --depth 1 https://github.com/resolume/ffgl.git ${{ github.workspace }}\..\ffgl

      - name: Install GLEW
        run: vcpkg install glew:x64-windows

      - name: Download ONNX Runtime with DirectML (NuGet)
        run: |
          # 1. ORT DirectML package (headers + DML-enabled onnxruntime.dll/.lib)
          $ortUrl = "https://api.nuget.org/v3-flatcontainer/microsoft.ml.onnxruntime.directml/1.20.1/microsoft.ml.onnxruntime.directml.1.20.1.nupkg"
          Invoke-WebRequest -Uri $ortUrl -OutFile "ort-dml.zip"
          Expand-Archive -Path "ort-dml.zip" -DestinationPath "ort-dml-pkg" -Force

          # 2. DirectML runtime (separate package – DirectML.dll lives here)
          $dmlUrl = "https://api.nuget.org/v3-flatcontainer/microsoft.ai.directml/1.15.4/microsoft.ai.directml.1.15.4.nupkg"
          Invoke-WebRequest -Uri $dmlUrl -OutFile "directml.zip"
          Expand-Archive -Path "directml.zip" -DestinationPath "directml-pkg" -Force

          # Normalise into the layout CMakeLists.txt expects
          New-Item -ItemType Directory -Force "onnxruntime/include"
          New-Item -ItemType Directory -Force "onnxruntime/lib"

          # Headers (dml_provider_factory.h is here)
          Copy-Item "ort-dml-pkg/build/native/include/*" "onnxruntime/include/" -Recurse -Force

          # Locate files dynamically – package layout varies between versions
          $lib = (Get-ChildItem "ort-dml-pkg" -Recurse -Filter "onnxruntime.lib" | Select-Object -First 1).FullName
          $dll = (Get-ChildItem "ort-dml-pkg" -Recurse -Filter "onnxruntime.dll" | Select-Object -First 1).FullName
          $dml = (Get-ChildItem "directml-pkg" -Recurse -Filter "DirectML.dll"   | Select-Object -First 1).FullName
          Copy-Item $lib "onnxruntime/lib/"
          Copy-Item $dll "onnxruntime/lib/"
          Copy-Item $dml "onnxruntime/lib/"

      - name: Download Depth Anything V2 Small ONNX model
        run: |
          $url = "https://huggingface.co/onnx-community/depth-anything-v2-small/resolve/main/onnx/model.onnx"
          Invoke-WebRequest -Uri $url -OutFile "depth_anything_v2_vits.onnx"

      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DORT_DIR="${{ github.workspace }}/onnxruntime"

      - name: Build Release
        run: cmake --build build --config Release

      - name: Stage model + GLEW
        run: |
          Copy-Item "depth_anything_v2_vits.onnx"                   "build/Release/"
          Copy-Item "C:/vcpkg/installed/x64-windows/bin/glew32.dll" "build/Release/"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AIDepthMap
          path: build/Release/
